# Non-saturating test: does AM's bias+value FIT beat pure selection at extreme
# compression? (~15-25 min on A100-80G). Single needle at 8000 tokens, ratios
# 128x-1024x -> compact cache shrinks to ~62..8 tokens, well past where single-
# needle saturates. mass_frac=1.0 makes AM select the SAME top-mass keys H2O
# uses (recent_frac=0), so any AM>H2O gap is attributable purely to AM's
# bias/value synthesis over those keys. If AM holds recall where H2O/SnapKV
# collapse, that's the defensible "better context management" win.
name: extreme-8b
backend: hf
model: meta-llama/Llama-3.1-8B-Instruct   # override: --model unsloth/Llama-3.1-8B-Instruct
device: cuda
dtype: bfloat16
out_dir: benchmarks/out/extreme-8b
plots: true

cost:
  name: a100-80g/8B
  kv_bytes_per_token: 262144

niah:
  enabled: true
  task: niah_single
  lengths: [8000]
  ratios: [128, 256, 512, 1024]
  seeds: 4
  ref_strategy: self_study
  n_ref: 256
  compactors: [attention_matching, heavy_hitter, snapkv, recent_window, random_subset]
  am: {alloc: sensitivity, ridge: 0.05, mass_frac: 1.0, recent_frac: 0.0}

agentic:
  enabled: false
