# Scale-up run: Llama-3.2-3B. Same Llama-arch exact compact-decode path as 1B,
# just a bigger model -> more layers/heads, longer contexts are affordable.
# Note: meta-llama models are gated on HF (set HF_TOKEN), or use an ungated
# mirror e.g. `unsloth/Llama-3.2-3B-Instruct`.
name: llama32-3b
backend: hf
model: meta-llama/Llama-3.2-3B-Instruct
device: cuda
dtype: bfloat16
out_dir: benchmarks/out/llama32-3b
plots: true

# Cost model for reporting GPU-seconds / $ (tune to your hardware).
# kv_bytes_per_token scaled from the 1B config by layers*kv_heads*head_dim.
cost:
  name: a100-80g/3B
  prefill_tok_per_s: 18000
  decode_tok_per_s: 120
  gpu_dollars_per_hour: 1.80
  kv_bytes_per_token: 229376

niah:
  enabled: true
  task: niah_single
  lengths: [2000, 8000]
  ratios: [8, 16, 32, 64, 128]
  seeds: 8
  ref_strategy: self_study
  n_ref: 256
  compactors: [attention_matching, heavy_hitter, snapkv, recent_window, random_subset]
  am: {alloc: sensitivity, ridge: 0.05}

agentic:
  enabled: true
  turns: 24
  turn_tokens: 500
  budget: 1000
  seeds: 4
  n_facts: 8
  strategies: [full_kv, truncate_recent, "dexa:attention_matching", "dexa:heavy_hitter"]
